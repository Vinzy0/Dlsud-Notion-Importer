<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDScraper</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body data-theme="light">
    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Fixed Header -->
    <header class="header">
        <div class="header-brand">
            <svg class="brand-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M6 7h8M6 10h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="15" cy="14" r="4" fill="url(#brandGrad)" stroke="none"/>
                <path d="M13.5 14l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="brandGrad" x1="11" y1="10" x2="19" y2="18">
                        <stop stop-color="var(--accent-start)"/>
                        <stop offset="1" stop-color="var(--accent-end)"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="brand-text">UD<span class="brand-accent">Scraper</span></span>
        </div>
        <div class="header-actions">
            <button id="settingsBtn" class="icon-btn" aria-label="Open Settings" title="Settings">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <circle cx="8" cy="3" r="1"/>
                    <circle cx="8" cy="8" r="1"/>
                    <circle cx="8" cy="13" r="1"/>
                    <line x1="1" y1="3" x2="6" y2="3"/>
                    <line x1="10" y1="3" x2="15" y2="3"/>
                    <line x1="1" y1="8" x2="6" y2="8"/>
                    <line x1="10" y1="8" x2="15" y2="8"/>
                    <line x1="1" y1="13" x2="6" y2="13"/>
                    <line x1="10" y1="13" x2="15" y2="13"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <button class="tab active" data-tab="tasks">Tasks</button>
        <button class="tab" data-tab="due-soon">Due Soon<span class="badge hidden" id="due-badge"></span></button>
        <button class="tab" data-tab="files">Files</button>
        <div class="tab-indicator" id="tab-indicator"></div>
    </nav>

    <!-- Main Content Area -->
    <main class="content-area" id="main-content">
        <!-- Empty / Status State -->
        <div id="status-message" class="empty-state">
            <div class="empty-illustration">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                    <rect x="14" y="8" width="36" height="48" rx="4" stroke="var(--text-tertiary)" stroke-width="2" fill="none"/>
                    <rect x="22" y="4" width="20" height="8" rx="4" fill="var(--bg-hover)" stroke="var(--text-tertiary)" stroke-width="2"/>
                    <path d="M22 26h20M22 34h14M22 42h18" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="44" cy="44" r="12" fill="url(#emptyGrad)"/>
                    <path d="M40 44h8M44 40v8" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="emptyGrad" x1="32" y1="32" x2="56" y2="56">
                            <stop stop-color="var(--accent-start)"/>
                            <stop offset="1" stop-color="var(--accent-end)"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <p class="empty-title" id="empty-title">Welcome to UDScraper</p>
            <p class="empty-desc" id="status-text">Open your dashboard and fetch your assignments</p>
            <button id="fetchInitialBtn" class="primary-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 1v5h5"/>
                    <path d="M3.51 10a6 6 0 1 0 .49-5L1 6"/>
                </svg>
                Fetch Tasks
            </button>
            <button id="fetchFilesInitialBtn" class="primary-btn hidden">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3v8m0 0l-3-3m3 3l3-3"/>
                    <path d="M3 13h10"/>
                </svg>
                Fetch Files
            </button>
            <div id="fileWarning" class="file-warning hidden">
                <div class="warning-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    </svg>
                </div>
                <p class="warning-text">File fetching only works inside a subject's module page</p>
                <label class="warning-checkbox">
                    <input type="checkbox" id="dismissFileWarning">
                    <span>Don't remind me again</span>
                </label>
                <button id="dismissFileWarningBtn" class="secondary-btn">Yeah, sure</button>
            </div>
        </div>

        <!-- Task Controls (search + filters) -->
        <div id="task-controls" class="task-controls hidden">
            <input type="text" id="taskSearch" class="task-search" placeholder="Search tasks...">
            <div class="task-controls-row">
                <div class="custom-select-wrapper">
                    <div id="subjectFilterBtn" class="custom-select-btn">
                        <span id="subjectFilterLabel">All Subjects</span>
                        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div id="subjectFilterDropdown" class="custom-select-dropdown hidden">
                        <div class="custom-select-option" data-value="">All Subjects</div>
                    </div>
                </div>
                <div class="custom-select-wrapper">
                    <div id="sortSelectBtn" class="custom-select-btn">
                        <span id="sortSelectLabel">Due Date</span>
                        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div id="sortSelectDropdown" class="custom-select-dropdown hidden">
                        <div class="custom-select-option selected" data-value="dueDate">Due Date</div>
                        <div class="custom-select-option" data-value="subject">Subject</div>
                        <div class="custom-select-option" data-value="name">Name</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lists (hidden initially) -->
        <div id="tasks-list" class="list-container hidden"></div>
        <div id="due-soon-list" class="list-container hidden"></div>
        <div id="files-list" class="list-container hidden"></div>
    </main>

    <!-- Action Bar (slides up from bottom) -->
    <div id="action-bar" class="action-bar">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="action-left">
            <select id="exportSelect" class="export-dropdown">
                <option value="notion">Send to Notion</option>
                <option value="text">Copy as Plain Text</option>
                <option value="markdown">Copy as Markdown</option>
                <option value="csv">Copy as CSV</option>
            </select>
            <button id="exportBtn" class="primary-btn small">Export</button>
        </div>
        <div class="action-right">
            <span id="selected-count" class="selected-text">0 selected</span>
            <button id="closeActionsBtn" class="icon-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <path d="M4 4l8 8M12 4l-8 8"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Backdrop -->
    <div id="settings-backdrop" class="settings-backdrop"></div>

    <!-- Settings Panel (slides from right) -->
    <aside id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>Settings</h3>
            <button id="closeSettingsBtn" class="icon-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <path d="M4 4l8 8M12 4l-8 8"/>
                </svg>
            </button>
        </div>
        <div class="settings-body">
            <div class="form-group row">
                <label for="notionSyncToggle">Enable Notion Sync</label>
                <label class="switch">
                    <input type="checkbox" id="notionSyncToggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="notionCredentialsSection">
                <div class="form-group">
                    <label for="apiKey">NOTION TOKEN</label>
                    <input type="password" id="apiKey" placeholder="secret_..." aria-label="Notion API Token">
                </div>
                <div class="form-group">
                    <label for="dbId">DATABASE ID</label>
                    <input type="text" id="dbId" placeholder="32 character ID" aria-label="Notion Database ID">
                </div>
                <button id="saveKeysBtn" class="primary-btn">Save Credentials</button>
                <div id="settings-status" class="status-msg"></div>
            </div>

            <hr class="divider">

            <div class="form-group row">
                <label for="autoRetrieve">Auto-Retrieve (Beta)</label>
                <label class="switch">
                    <input type="checkbox" id="autoRetrieve">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="form-group row">
                <label for="darkMode">Dark Mode</label>
                <label class="switch">
                    <input type="checkbox" id="darkMode">
                    <span class="slider round"></span>
                </label>
            </div>

            <hr class="divider">

            <button id="clearDataBtn" class="danger-btn">Clear All Data</button>
        </div>
        <div class="settings-footer">
            <span>UDScraper v2.0</span>
        </div>
    </aside>

    <!-- Module Selector Modal -->
    <div id="moduleSelectorModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Lessons</h3>
                <label class="select-all-label"><input type="checkbox" id="selectAllModules" checked> Select All</label>
            </div>
            <div id="moduleList" class="module-list"></div>
            <div class="action-bar modal-actions">
                <button id="cancelModuleBtn" class="secondary-btn small">Cancel</button>
                <button id="scanModulesBtn" class="primary-btn small">Scan Selected</button>
            </div>
        </div>
    </div>

    <script src="scraper.js"></script>
    <script src="popup.js"></script>
</body>

</html>
