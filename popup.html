<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLSUD to Notion</title>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: sans-serif;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background: #2eaadc;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: #2589b1;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        #settings-area {
            border-top: 1px solid #eee;
            margin-top: 10px;
            padding-top: 10px;
        }

        label {
            font-size: 10px;
            color: #666;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            word-wrap: break-word;
        }

        .icon-btn {
            background: none;
            color: #999;
            font-size: 10px;
            padding: 5px;
            text-decoration: underline;
            width: auto;
            margin-top: 5px;
        }

        .icon-btn:hover:not(:disabled) {
            background: none;
            color: #666;
        }
    </style>
</head>

<body>
    <div id="main-view">
        <button id="syncBtn">Sync Tasks</button>
        <div id="status">Ready</div>
        <button id="toggleSettings" class="icon-btn">Configure Keys</button>
    </div>

    <div id="settings-view" class="hidden">
        <h3>Configuration</h3>
        <label for="apiKey">NOTION TOKEN</label>
        <input type="password" id="apiKey" placeholder="secret_..." aria-label="Notion API Token">

        <label for="dbId">DATABASE ID</label>
        <input type="text" id="dbId" placeholder="32 char ID" aria-label="Notion Database ID">

        <button id="saveBtn">Save &amp; Close</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
